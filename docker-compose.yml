version: '3.9'

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: placement_test
    ports:
      - '5433:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build: .
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/placement_test
      ADMIN_PASSWORD: Fly@Admin2025
      COOKIE_SECRET: change-this-secret-in-production
      NODE_ENV: production
      SMTP_HOST: smtp.gmail.com
      SMTP_PORT: "587"
      SMTP_SECURE: "false"
      SMTP_USER: your-gmail@gmail.com
      SMTP_PASS: your-gmail-app-password
      SMTP_FROM: "Fly Immigration Test <your-gmail@gmail.com>"
      NOTIFY_EMAIL: elysia.huynh@flymigration.vn
    depends_on:
      - db

volumes:
  pgdata:
